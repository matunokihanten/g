<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禅スタジオ - 高精度音響モデル</title>
    <style>
        :root {
            --bg-dark: #1a222f;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --accent-blue: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }
        body {
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 30px 20px;
            box-sizing: border-box;
        }
        header { text-align: center; margin-bottom: 25px; }
        h1 { font-weight: 200; letter-spacing: 6px; font-size: 20px; color: var(--accent-blue); }
        
        .visual-card {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        canvas { width: 100%; height: 100px; border-radius: 10px; }
        #status { font-size: 12px; color: var(--accent-blue); margin-top: 10px; text-align: center; }

        .section-label { font-size: 12px; color: var(--text-dim); margin: 20px 0 10px 5px; border-left: 3px solid var(--accent-blue); padding-left: 8px; }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn {
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim); padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer;
        }
        .mode-btn.active { background: var(--accent-blue); color: #0f172a; font-weight: bold; }

        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .preset-btn {
            background: #334155; color: white; border: none; padding: 18px; border-radius: 12px;
            font-size: 16px; cursor: pointer; transition: transform 0.1s, background 0.2s;
        }
        .preset-btn.active { outline: 2px solid var(--accent-blue); background: #3e4e63; }

        .slider-group { margin-bottom: 25px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: #475569; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--accent-blue); border: 3px solid #fff; cursor: pointer;
        }

        .mixer-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px;
        }
        .mixer-item { display: flex; flex-direction: column; gap: 5px; font-size: 11px; }

        .bottom-nav {
            position: sticky; bottom: 20px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px); border-radius: 35px; padding: 12px 25px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--accent-blue); color: #0f172a; font-size: 20px; cursor: pointer; }
        select { background: transparent; color: #fff; border: none; font-size: 14px; outline: none; }
        .footer-info { text-align: center; font-size: 10px; color: var(--text-dim); margin-top: 25px; }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>禅スタジオ</h1></header>

    <div class="visual-card">
        <canvas id="viz"></canvas>
        <div id="status">音響システム待機中</div>
    </div>

    <div class="section-label">再生モード</div>
    <div class="mode-selector">
        <button class="mode-btn active" id="modeBoth" onclick="changeMode('both')">同時再生</button>
        <button class="mode-btn" id="modeFreq" onclick="changeMode('freq')">周波数のみ</button>
        <button class="mode-btn" id="modeNature" onclick="changeMode('nature')">環境音のみ</button>
    </div>

    <div class="preset-grid">
        <button class="preset-btn" onclick="setBeat(2)">睡眠 (2Hz)</button>
        <button class="preset-btn" onclick="setBeat(6)">瞑想 (6Hz)</button>
        <button class="preset-btn" onclick="setBeat(10)">学習 (10Hz)</button>
        <button class="preset-btn active" id="initFocus" onclick="setBeat(29)">集中 (29Hz)</button>
    </div>

    <div class="slider-group">
        <div class="slider-header">
            <span>バイノーラル周波数</span>
            <span style="color:var(--accent-blue); font-weight:bold;"><span id="beatDisp">29</span> Hz</span>
        </div>
        <input type="range" id="beatSlider" min="0.5" max="40" step="0.5" value="29">
    </div>

    <div class="section-label">基本周波数（ソルフェジオ）</div>
    <select id="baseSelect" style="width:100%; background:#334155; padding:12px; border-radius:10px; margin-bottom:20px;">
        <option value="174">174Hz (苦痛の軽減)</option>
        <option value="432">432Hz (自然界の調律)</option>
        <option value="528" selected>528Hz (理想の修復・奇跡)</option>
        <option value="639">639Hz (対人関係の向上)</option>
    </select>

    <div class="section-label">環境音ミキサー（高精度合成）</div>
    <div class="mixer-grid" id="mixer"></div>

    <div class="bottom-nav">
        <select id="timer">
            <option value="0">タイマーなし</option>
            <option value="15">15分後に停止</option>
            <option value="30">30分後に停止</option>
            <option value="60">60分後に停止</option>
        </select>
        <button class="play-btn" id="playBtn">▶</button>
        <div style="font-size:12px">音量: <span id="volDisp">80</span>%</div>
    </div>

    <div class="footer-info">制作：松乃木飯店</div>
</div>

<script>
    const sounds = [
        { id: 'rain', name: '本降りの雨', base: 'brown', filter: 'lowpass', freq: 1500, q: 1, lfo: 0, impulse: 0.08 },
        { id: 'wave', name: '深みのある波', base: 'brown', filter: 'lowpass', freq: 400, q: 2, lfo: 0.12, surge: true },
        { id: 'fire', name: '薪の焚き火', base: 'white', filter: 'bandpass', freq: 800, q: 0.5, lfo: 15, crackle: 0.05 },
        { id: 'river', name: 'せせらぎ', base: 'brown', filter: 'bandpass', freq: 1200, q: 5, lfo: 2.5 },
        { id: 'wind', name: '吹き抜ける風', base: 'brown', filter: 'bandpass', freq: 300, q: 1, lfo: 0.05, dynamic: true },
        { id: 'deep', name: '深海の響き', base: 'brown', filter: 'lowpass', freq: 100, q: 1, lfo: 0.02 }
    ];

    let audioCtx, oscL, oscR, masterGain, analyser, binauralGain, natureMasterGain;
    let isPlaying = false, currentMode = 'both', baseHz = 528, beatHz = 29;

    const mixer = document.getElementById('mixer');
    sounds.forEach(s => {
        const d = document.createElement('div');
        d.className = 'mixer-item';
        d.innerHTML = `<span>${s.name}</span><input type="range" id="vol-${s.id}" min="0" max="100" value="0">`;
        mixer.appendChild(d);
    });

    function createBrownNoise(duration) {
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        let lastOut = 0.0;
        for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            data[i] = (lastOut + (0.02 * white)) / 1.02;
            lastOut = data[i];
            data[i] *= 3.5; 
        }
        return buffer;
    }

    function init() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.8;
        masterGain.connect(audioCtx.destination);

        binauralGain = audioCtx.createGain();
        natureMasterGain = audioCtx.createGain();
        binauralGain.connect(analyser);
        natureMasterGain.connect(analyser);
        analyser.connect(masterGain);

        oscL = audioCtx.createOscillator();
        oscR = audioCtx.createOscillator();
        const merger = audioCtx.createChannelMerger(2);
        const pL = audioCtx.createStereoPanner(); pL.pan.value = -1;
        const pR = audioCtx.createStereoPanner(); pR.pan.value = 1;
        oscL.connect(pL).connect(merger, 0, 0);
        oscR.connect(pR).connect(merger, 0, 1);
        merger.connect(binauralGain);
        oscL.start(); oscR.start();

        sounds.forEach(s => {
            const src = audioCtx.createBufferSource();
            src.buffer = createBrownNoise(2);
            src.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = s.filter; filter.frequency.value = s.freq; filter.Q.value = s.q;
            const g = audioCtx.createGain(); g.gain.value = 0;

            if (s.surge) { // 波のうねり
                const lfo = audioCtx.createOscillator(); lfo.frequency.value = s.lfo;
                const lg = audioCtx.createGain(); lg.gain.value = 300;
                lfo.connect(lg).connect(filter.frequency);
                const vg = audioCtx.createGain(); vg.gain.value = 0.2;
                lfo.connect(vg).connect(g.gain); lfo.start();
            } else if (s.lfo > 0) {
                const l = audioCtx.createOscillator(); l.frequency.value = s.lfo;
                const lg = audioCtx.createGain(); lg.gain.value = 0.1;
                l.connect(lg).connect(g.gain); l.start();
            }

            if (s.crackle || s.impulse) { // パチパチ音、雨の粒
                const pG = audioCtx.createGain(); pG.gain.value = 0;
                setInterval(() => {
                    if (g.gain.value > 0.01) {
                        const iG = audioCtx.createGain();
                        const osc = audioCtx.createOscillator();
                        osc.type = 'square'; osc.frequency.value = Math.random() * 4000;
                        iG.gain.setValueAtTime(0.05, audioCtx.currentTime);
                        iG.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.02);
                        osc.connect(iG).connect(g); osc.start(); osc.stop(audioCtx.currentTime + 0.02);
                    }
                }, s.crackle ? 100 : 50);
            }

            src.connect(filter).connect(g).connect(natureMasterGain); src.start();
            document.getElementById(`vol-${s.id}`).oninput = (e) => {
                g.gain.setTargetAtTime((e.target.value/100) * 0.4, audioCtx.currentTime, 0.1);
            };
        });
        applyMode(); update(); draw();
    }

    function applyMode() {
        if(!audioCtx) return;
        const now = audioCtx.currentTime;
        binauralGain.gain.setTargetAtTime(currentMode === 'nature' ? 0 : 1, now, 0.2);
        natureMasterGain.gain.setTargetAtTime(currentMode === 'freq' ? 0 : 1, now, 0.2);
    }

    window.changeMode = (mode) => {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
        applyMode();
    };

    function update() {
        if(!audioCtx) return;
        oscL.frequency.setTargetAtTime(baseHz, audioCtx.currentTime, 0.2);
        oscR.frequency.setTargetAtTime(baseHz + beatHz, audioCtx.currentTime, 0.2);
        document.getElementById('status').innerText = `${baseHz}Hz + ${beatHz}Hz 脳波誘導中`;
    }

    window.setBeat = (val) => {
        beatHz = val; document.getElementById('beatSlider').value = val;
        document.getElementById('beatDisp').innerText = val;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        if(event) event.target.classList.add('active');
        update();
    };

    document.getElementById('beatSlider').oninput = (e) => {
        beatHz = parseFloat(e.target.value); document.getElementById('beatDisp').innerText = beatHz; update();
    };

    document.getElementById('baseSelect').onchange = (e) => {
        baseHz = parseFloat(e.target.value); update();
    };

    document.getElementById('playBtn').onclick = function() {
        init();
        if(audioCtx.state === 'suspended') {
            audioCtx.resume(); this.innerHTML = 'Ⅱ'; isPlaying = true;
            const t = parseInt(document.getElementById('timer').value);
            if(t > 0) setTimeout(() => { masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 10); }, t * 60000);
        } else {
            audioCtx.suspend(); this.innerHTML = '▶'; isPlaying = false;
        }
    };

    function draw() {
        requestAnimationFrame(draw);
        const c = document.getElementById('viz'), ctx = c.getContext('2d');
        const d = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(d);
        ctx.clearRect(0,0,c.width,c.height);
        for(let i=0; i<60; i++) {
            const h = (d[i]/255) * c.height;
            ctx.fillStyle = `rgba(56, 189, 248, ${h/100 + 0.3})`;
            ctx.fillRect(i * (c.width/60), c.height - h, (c.width/60)-2, h);
        }
    }
</script>
</body>
</html>
