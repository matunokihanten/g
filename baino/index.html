<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禅スタジオ - ノイズ・カラー・エディション</title>
    <style>
        :root {
            --bg-dark: #1a222f;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --accent-blue: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }
        body {
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 30px 20px;
            box-sizing: border-box;
        }
        header { text-align: center; margin-bottom: 25px; }
        h1 { font-weight: 200; letter-spacing: 6px; font-size: 20px; color: var(--accent-blue); }
        
        .visual-card {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        canvas { width: 100%; height: 100px; border-radius: 10px; }
        #status { font-size: 12px; color: var(--accent-blue); margin-top: 10px; text-align: center; }

        .section-label { font-size: 12px; color: var(--text-dim); margin: 20px 0 10px 5px; border-left: 3px solid var(--accent-blue); padding-left: 8px; }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn {
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim); padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer;
        }
        .mode-btn.active { background: var(--accent-blue); color: #0f172a; font-weight: bold; }

        /* ノイズカラー・セレクター */
        .color-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px; }
        .color-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim); padding: 8px 2px; border-radius: 6px; font-size: 10px; cursor: pointer;
        }
        .color-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(56, 189, 248, 0.1); }

        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .preset-btn {
            background: #334155; color: white; border: none; padding: 18px; border-radius: 12px;
            font-size: 16px; cursor: pointer; transition: transform 0.1s, background 0.2s;
        }
        .preset-btn.active { outline: 2px solid var(--accent-blue); background: #3e4e63; }

        .slider-group { margin-bottom: 25px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: #475569; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--accent-blue); border: 3px solid #fff; cursor: pointer;
        }

        .mixer-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px;
        }
        .mixer-item { display: flex; flex-direction: column; gap: 5px; font-size: 11px; }

        .bottom-nav {
            position: sticky; bottom: 20px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px); border-radius: 35px; padding: 12px 25px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--accent-blue); color: #0f172a; font-size: 20px; cursor: pointer; }
        select { background: transparent; color: #fff; border: none; font-size: 14px; outline: none; }
        .footer-info { text-align: center; font-size: 10px; color: var(--text-dim); margin-top: 25px; }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>禅スタジオ</h1></header>

    <div class="visual-card">
        <canvas id="viz"></canvas>
        <div id="status">音響システム待機中</div>
    </div>

    <div class="section-label">再生モード</div>
    <div class="mode-selector">
        <button class="mode-btn active" id="modeBoth" onclick="changeMode('both')">同時再生</button>
        <button class="mode-btn" id="modeFreq" onclick="changeMode('freq')">周波数のみ</button>
        <button class="mode-btn" id="modeNature" onclick="changeMode('nature')">環境音のみ</button>
    </div>

    <div class="section-label">ノイズ・カラー選択</div>
    <div class="color-selector">
        <button class="color-btn" id="col-white" onclick="setColor('white')">ホワイト</button>
        <button class="color-btn" id="col-pink" onclick="setColor('pink')">ピンク</button>
        <button class="color-btn active" id="col-brown" onclick="setColor('brown')">ブラウン</button>
        <button class="color-btn" id="col-blue" onclick="setColor('blue')">ブルー</button>
        <button class="color-btn" id="col-violet" onclick="setColor('violet')">バイオレット</button>
    </div>

    <div class="preset-grid">
        <button class="preset-btn" onclick="setPreset('sleep')">睡眠 (2Hz)</button>
        <button class="preset-btn" onclick="setPreset('meditation')">瞑想 (6Hz)</button>
        <button class="preset-btn" onclick="setPreset('study')">学習 (10Hz)</button>
        <button class="preset-btn active" id="initFocus" onclick="setPreset('focus')">集中 (29Hz)</button>
    </div>

    <div class="slider-group">
        <div class="slider-header">
            <span>バイノーラル周波数</span>
            <span style="color:var(--accent-blue); font-weight:bold;"><span id="beatDisp">29</span> Hz</span>
        </div>
        <input type="range" id="beatSlider" min="0.5" max="40" step="0.5" value="29">
    </div>

    <div class="section-label">基本周波数（ソルフェジオ）</div>
    <select id="baseSelect" style="width:100%; background:#334155; padding:12px; border-radius:10px; margin-bottom:20px;">
        <option value="174">174Hz (苦痛の軽減)</option>
        <option value="432">432Hz (自然界の調律)</option>
        <option value="528" selected>528Hz (理想の修復・奇跡)</option>
        <option value="639">639Hz (対人関係の向上)</option>
    </select>

    <div class="section-label">環境音ミキサー（1/fゆらぎ対応）</div>
    <div class="mixer-grid" id="mixer"></div>

    <div class="bottom-nav">
        <select id="timer">
            <option value="0">タイマーなし</option>
            <option value="15">15分後に停止</option>
            <option value="30">30分後に停止</option>
            <option value="60">60分後に停止</option>
        </select>
        <button class="play-btn" id="playBtn">▶</button>
        <div style="font-size:12px">音量: <span id="volDisp">80</span>%</div>
    </div>

    <div class="footer-info">制作：松乃木飯店</div>
</div>

<script>
    const sounds = [
        { id: 'rain', name: '本降りの雨', type: 'lowpass', freq: 1500, q: 1, impulse: 0.08 },
        { id: 'wave', name: '深みのある波', type: 'lowpass', freq: 400, q: 2, surge: true },
        { id: 'fire', name: '薪の焚き火', type: 'bandpass', freq: 800, q: 0.5, crackle: 0.05 },
        { id: 'river', name: 'せせらぎ', type: 'bandpass', freq: 1200, q: 5, lfo: 2.5 },
        { id: 'wind', name: '吹き抜ける風', type: 'bandpass', freq: 300, q: 1, dynamic: true },
        { id: 'deep', name: '深海の響き', type: 'lowpass', freq: 100, q: 1 }
    ];

    let audioCtx, oscL, oscR, masterGain, analyser, binauralGain, natureMasterGain;
    let isPlaying = false, currentMode = 'both', baseHz = 528, beatHz = 29, noiseColor = 'brown';
    let noiseSources = [];

    const mixer = document.getElementById('mixer');
    sounds.forEach(s => {
        const d = document.createElement('div');
        d.className = 'mixer-item';
        d.innerHTML = `<span>${s.name}</span><input type="range" id="vol-${s.id}" min="0" max="100" value="0">`;
        mixer.appendChild(d);
    });

    // --- 各色ノイズ生成用バッファ作成 ---
    function generateNoiseBuffer(color) {
        const duration = 2;
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);

        if (color === 'white') {
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        } else if (color === 'pink') {
            let b0, b1, b2, b3, b4, b5, b6;
            b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                data[i] *= 0.11;
                b6 = white * 0.115926;
            }
        } else if (color === 'brown') {
            let lastOut = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                data[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = data[i];
                data[i] *= 3.5;
            }
        } else if (color === 'blue') {
            let lastOut = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                data[i] = white - lastOut;
                lastOut = white;
                data[i] *= 0.5;
            }
        } else if (color === 'violet') {
            let lastOut = 0.0, lastOut2 = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                let high = white - lastOut;
                data[i] = high - lastOut2;
                lastOut = white; lastOut2 = high;
                data[i] *= 0.25;
            }
        }
        return buffer;
    }

    function init() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        masterGain = audioCtx.createGain(); masterGain.gain.value = 0.8;
        masterGain.connect(audioCtx.destination);

        binauralGain = audioCtx.createGain();
        natureMasterGain = audioCtx.createGain();
        binauralGain.connect(analyser);
        natureMasterGain.connect(analyser);
        analyser.connect(masterGain);

        oscL = audioCtx.createOscillator(); oscR = audioCtx.createOscillator();
        const merger = audioCtx.createChannelMerger(2);
        const pL = audioCtx.createStereoPanner(); pL.pan.value = -1;
        const pR = audioCtx.createStereoPanner(); pR.pan.value = 1;
        oscL.connect(pL).connect(merger, 0, 0);
        oscR.connect(pR).connect(merger, 0, 1);
        merger.connect(binauralGain);
        oscL.start(); oscR.start();

        updateNatureSounds();
        applyMode(); update(); draw();
    }

    function updateNatureSounds() {
        // 既存のノイズ源をクリア
        noiseSources.forEach(s => s.source.stop());
        noiseSources = [];

        sounds.forEach(s => {
            const src = audioCtx.createBufferSource();
            src.buffer = generateNoiseBuffer(noiseColor);
            src.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = s.type; filter.frequency.value = s.freq; filter.Q.value = s.q;
            const g = audioCtx.createGain();
            const volInput = document.getElementById(`vol-${s.id}`);
            g.gain.value = (volInput.value / 100) * 0.4;

            if (s.surge) {
                const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.12;
                const lg = audioCtx.createGain(); lg.gain.value = 300;
                lfo.connect(lg).connect(filter.frequency);
                const vg = audioCtx.createGain(); vg.gain.value = 0.2;
                lfo.connect(vg).connect(g.gain); lfo.start();
            }

            src.connect(filter).connect(g).connect(natureMasterGain);
            src.start();
            noiseSources.push({source: src, gain: g});

            volInput.oninput = (e) => {
                g.gain.setTargetAtTime((e.target.value/100) * 0.4, audioCtx.currentTime, 0.1);
            };
        });
    }

    window.setColor = (color) => {
        noiseColor = color;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('col-' + color).classList.add('active');
        if (audioCtx) updateNatureSounds();
    };

    window.setPreset = (type) => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        if (event) event.target.classList.add('active');

        switch(type) {
            case 'sleep': beatHz = 2; setColor('brown'); break;
            case 'meditation': beatHz = 6; setColor('pink'); break;
            case 'study': beatHz = 10; setColor('pink'); break;
            case 'focus': beatHz = 29; setColor('white'); break; // 集中：少しホワイト寄り
            case 'brain': beatHz = 40; setColor('blue'); break; // 脳トレ用
        }
        document.getElementById('beatSlider').value = beatHz;
        document.getElementById('beatDisp').innerText = beatHz;
        update();
    };

    function applyMode() {
        if(!audioCtx) return;
        const now = audioCtx.currentTime;
        binauralGain.gain.setTargetAtTime(currentMode === 'nature' ? 0 : 1, now, 0.2);
        natureMasterGain.gain.setTargetAtTime(currentMode === 'freq' ? 0 : 1, now, 0.2);
    }

    window.changeMode = (mode) => {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
        applyMode();
    };

    function update() {
        if(!audioCtx) return;
        oscL.frequency.setTargetAtTime(baseHz, audioCtx.currentTime, 0.2);
        oscR.frequency.setTargetAtTime(baseHz + beatHz, audioCtx.currentTime, 0.2);
        document.getElementById('status').innerText = `${baseHz}Hz + ${beatHz}Hz 脳波誘導中`;
    }

    document.getElementById('beatSlider').oninput = (e) => {
        beatHz = parseFloat(e.target.value); document.getElementById('beatDisp').innerText = beatHz; update();
    };

    document.getElementById('baseSelect').onchange = (e) => {
        baseHz = parseFloat(e.target.value); update();
    };

    document.getElementById('playBtn').onclick = function() {
        init();
        if(audioCtx.state === 'suspended') {
            audioCtx.resume(); this.innerHTML = 'Ⅱ'; isPlaying = true;
            const t = parseInt(document.getElementById('timer').value);
            if(t > 0) setTimeout(() => { masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 10); }, t * 60000);
        } else {
            audioCtx.suspend(); this.innerHTML = '▶'; isPlaying = false;
        }
    };

    function draw() {
        requestAnimationFrame(draw);
        const c = document.getElementById('viz'), ctx = c.getContext('2d');
        const d = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(d);
        ctx.clearRect(0,0,c.width,c.height);
        for(let i=0; i<60; i++) {
            const h = (d[i]/255) * c.height;
            ctx.fillStyle = `rgba(56, 189, 248, ${h/100 + 0.3})`;
            ctx.fillRect(i * (c.width/60), c.height - h, (c.width/60)-2, h);
        }
    }
</script>
</body>
</html>
